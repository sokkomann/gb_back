<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Detail | BIDEO</title>
    <th:block th:replace="~{layout/layout :: ytShellHead('Gallery Detail - Bideo')}"></th:block>
    <!-- 새로 만든 CSS 파일 연결 (상대 경로) -->
    <link rel="stylesheet" href="/css/work/gallery-detail.css" th:href="@{/css/work/gallery-detail.css}">
</head>
<body class="gallery-detail-body" id="section">
    <div th:replace="~{layout/layout :: ytShellChrome('gallery')}"></div>

    <main class="yt-shell__page-content gallery-page" aria-label="예술관 상세">
        <div id="page-manager" class="gallery-page-manager">
            <div class="gallery-browse" data-rounded-container page-subtype="home">
                
                <div id="header" class="gallery-header">
                    <div class="gallery-top-actions" aria-label="상단 액션">
                        <button class="gallery-top-action-button" type="button" aria-label="추가 작업" aria-expanded="false" data-role="gallery-top-menu-button">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M12 4a2 2 0 100 4 2 2 0 000-4Zm0 6a2 2 0 100 4 2 2 0 000-4Zm0 6a2 2 0 100 4 2 2 0 000-4Z"></path>
                            </svg>
                        </button>
                        <button class="gallery-top-action-button" type="button" aria-label="닫기" data-role="gallery-close-button">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M17.293 5.293 12 10.586 6.707 5.293a1 1 0 10-1.414 1.414L10.586 12l-5.293 5.293a1 1 0 001.414 1.414L12 13.414l5.293 5.293a1 1 0 001.414-1.414L13.414 12l5.293-5.293a1 1 0 10-1.414-1.414Z"></path>
                            </svg>
                        </button>
                    </div>
                    <div class="gallery-carousel-header">
                        <div id="contents" class="gallery-carousel-contents">
                            <div class="gallery-carousel-item grid grid-disabled">
                                <div id="carousel-item" class="gallery-carousel-card">
                                    <div class="gallery-promo-panel" data-panel-layout="DEFAULT_PROMO_PANEL_RENDERER_LAYOUT_B">
                                        
                                        <div id="hero" class="gallery-hero" 
                                             style="background-image: url('https://i.ytimg.com/vi/JUSvuYc02WA/maxresdefault.jpg');"> 
                                            </div>
                                        <div id="scrim" class="gallery-scrim"></div>
                                       
                                        <!-- 예술관 내용 -->

                                        <div id="content" class="gallery-promo-content grid grid-disabled">
                                            <div class="promo-text-wrapper">
                                                
                                                <h1 id="hero-title" class="gallery-hero-title" th:text="${gallery.title}">예술관 제목</h1>
                                                
                                                <div id="description" class="gallery-description">
                                                    <span style="color: rgba(255, 255, 255, 0.6); letter-spacing: 1px;"
                                                          th:text="${gallery.description}">예술관 설명</span>
                                                </div>


                                                <p class="hero-meta"
                                                   th:text="|작품 ${gallery.workCount == null ? 0 : gallery.workCount}개 · 좋아요 ${gallery.likeCount == null ? 0 : gallery.likeCount}개|">작품 0개 · 좋아요 0개</p>

                                                <!-- [추가] 시청하기 아래 썸네일 내비게이션 영역 -->
                                                <!-- <div id="pagination-thumbnails" class="style-scope ytd-carousel-item-renderer">
                                                    <button class="selected style-scope ytd-carousel-item-renderer">
                                                        <div class="thumb-img-wrapper">
                                                            <img src="https://i.ytimg.com/vi/JUSvuYc02WA/hqdefault.jpg" alt="Thumb 1">
                                                        </div>
                                                        <div class="progress-bar style-scope ytd-carousel-item-renderer"></div>
                                                    </button>
                                                    <button class="style-scope ytd-carousel-item-renderer">
                                                        <div class="thumb-img-wrapper">
                                                            <img src="https://i.ytimg.com/vi/t8ENzGqyiMI/hqdefault.jpg" alt="Thumb 2">
                                                        </div>
                                                        <div class="progress-bar style-scope ytd-carousel-item-renderer"></div>
                                                    </button>
                                                    <button class="style-scope ytd-carousel-item-renderer">
                                                        <div class="thumb-img-wrapper">
                                                            <img src="https://i.ytimg.com/vi/nMQpvfvQwvQ/hqdefault.jpg" alt="Thumb 3">
                                                        </div>
                                                        <div class="progress-bar style-scope ytd-carousel-item-renderer"></div>
                                                    </button>
                                                    
                                                </div> -->
                                            </div>
                                        </div>

                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="gallery-results grid grid-disabled">
                    <div id="primary" class="gallery-results-primary">
                        <div class="gallery-rich-grid">
                            <div id="contents" class="gallery-rich-grid-contents">
                                <!-- Shorts 섹션 -->

                                <!-- 동영상 그리드 -->
                                <div class="content-row-section">
                                    <h2>인기 급상승</h2>
                                    <div class="video-grid">
                                        <a class="video-item"
                                           th:if="${!#lists.isEmpty(gallery.works)}"
                                           th:each="work : ${gallery.works}"
                                           th:href="@{/work/detail/{id}(id=${work.id})}">
                                            <div class="thumb">
                                                <img th:if="${work.thumbnailUrl != null and !#strings.isEmpty(work.thumbnailUrl)}"
                                                     th:src="${work.thumbnailUrl}"
                                                     th:alt="${work.title}">
                                            </div>
                                            <div class="item-meta">
                                                <div class="item-avatar">
                                                    <img th:if="${gallery.coverImage != null and !#strings.isEmpty(gallery.coverImage)}"
                                                         th:src="${gallery.coverImage}"
                                                         th:alt="${gallery.memberNickname}">
                                                </div>
                                                <div class="item-copy">
                                                    <h3 th:text="${work.title}">작품 제목</h3>
                                                    <p class="item-channel" th:text="${gallery.memberNickname}">작가명</p>
                                                    <p class="item-stats"
                                                       th:text="|조회수 ${work.viewCount == null ? 0 : work.viewCount}회 · 좋아요 ${work.likeCount == null ? 0 : work.likeCount}개|">조회수 0회 · 좋아요 0개</p>
                                                </div>
                                            </div>
                                        </a>
                                        <div th:if="${#lists.isEmpty(gallery.works)}">
                                            등록된 작품이 없습니다.
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div class="work-action-sheet" hidden data-role="gallery-top-action-menu" aria-hidden="true">
        <button class="danger" type="button">수정하기</button>
        <button class="danger" type="button">삭제하기</button>
        <button class="cancel" type="button">취소</button>
    </div>
    <th:block th:replace="~{layout/layout :: ytShellScripts()}"></th:block>
    <script>
        (() => {
            const menuButton = document.querySelector('[data-role="gallery-top-menu-button"]');
            const menu = document.querySelector('[data-role="gallery-top-action-menu"]');
            const closeButton = document.querySelector('[data-role="gallery-close-button"]');

            if (!menuButton || !menu) {
                return;
            }

            const closeMenu = () => {
                menu.hidden = true;
                menu.setAttribute("aria-hidden", "true");
                menuButton.setAttribute("aria-expanded", "false");
            };

            const openMenu = () => {
                menu.hidden = false;
                menu.setAttribute("aria-hidden", "false");
                menuButton.setAttribute("aria-expanded", "true");
            };

            menuButton.addEventListener("click", (event) => {
                event.stopPropagation();
                if (menu.hidden) {
                    openMenu();
                    return;
                }

                closeMenu();
            });

            menu.addEventListener("click", (event) => {
                const cancelButton = event.target.closest(".cancel");
                event.stopPropagation();
                if (cancelButton) {
                    closeMenu();
                }
            });

            document.addEventListener("click", closeMenu);

            document.addEventListener("keydown", (event) => {
                if (event.key === "Escape") {
                    closeMenu();
                }
            });

            closeButton?.addEventListener("click", () => {
                closeMenu();
                if (window.history.length > 1) {
                    window.history.back();
                }
            });
        })();
    </script>
</body>
</html>
