<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <th:block th:replace="~{layout/layout :: ytShellHead('BIDEO | 내 프로필')}"></th:block>
    <link rel="stylesheet" href="/css/common/reset.css" th:href="@{/css/common/reset.css}" />
    <link rel="stylesheet" href="/css/common/global.css" th:href="@{/css/common/global.css}" />
    <link rel="stylesheet" href="/css/common/util.css" th:href="@{/css/common/util.css}" />
    <link rel="stylesheet" href="/css/common/common.css" th:href="@{/css/common/common.css}" />
    <link rel="stylesheet" href="/css/profile/profile.css" th:href="@{/css/profile/profile.css}" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="/js/modal/event.js" th:src="@{/js/modal/event.js}"></script>
    <script defer src="/js/share/share.js" th:src="@{/js/share/share.js}"></script>
    <script defer src="/js/profile/event.js" th:src="@{/js/profile/event.js}"></script>
  </head>
  <body>
    <div th:replace="~{layout/layout :: ytShellChrome('profile')}"></div>
    <main class="yt-shell__page-content">
    <div id="section" class="profilePage section">
      <div class="content">
        <div class="channelSection">
          <div class="banner"
               th:classappend="${profile.bannerImage != null and !#strings.isEmpty(profile.bannerImage)} ? ' has-image' : ' is-hidden'"
               th:style="${profile.bannerImage != null and !#strings.isEmpty(profile.bannerImage)} ? |background-image: linear-gradient(180deg, rgba(16, 24, 40, 0.16), rgba(16, 24, 40, 0.48)), url('${profile.bannerImage}');| : null">
            <button type="button" class="bannerManageButton" data-banner-edit-open>배너 수정</button>
          </div>

          <div class="channelMeta">
            <button type="button" class="avatar avatarEditable" data-profile-avatar-open>
              <img th:if="${profile.profileImage != null and !#strings.isEmpty(profile.profileImage)}"
                   th:src="${profile.profileImage}"
                   th:alt="|${profile.nickname} 프로필 이미지|">
              <span class="avatarValue"
                    data-profile-avatar-value
                    th:unless="${profile.profileImage != null and !#strings.isEmpty(profile.profileImage)}"
                    th:text="${profile.nickname != null and #strings.length(profile.nickname) > 0 ? #strings.substring(profile.nickname, 0, 1) : 'N'}">N</span>
              <span class="avatarHover" aria-hidden="true">
                <svg viewBox="0 0 24 24" class="avatarHoverIcon">
                  <path d="M4 7.5A2.5 2.5 0 0 1 6.5 5h2.17a1 1 0 0 0 .8-.4l.86-1.14A1 1 0 0 1 11.13 3h1.74a1 1 0 0 1 .8.46l.86 1.14a1 1 0 0 0 .8.4h2.17A2.5 2.5 0 0 1 20 7.5v9A2.5 2.5 0 0 1 17.5 19h-11A2.5 2.5 0 0 1 4 16.5z" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"></path>
                  <circle cx="12" cy="12" r="3.2" fill="none" stroke="currentColor" stroke-width="1.8"></circle>
                </svg>
              </span>
            </button>

            <div class="metaInfo">
              <h1 class="channelTitle">
                <span data-profile-nickname th:text="${profile.nickname}">닉네임</span>
                <a class="more" href="javascript:void(0)" data-more-button></a>
              </h1>
              <p class="channelText">
                <span data-profile-name th:text="${profile.realName != null and !#strings.isEmpty(profile.realName) ? profile.realName : '-'}">이름</span>
                <span th:text="| · 팔로워 ${profile.followerCount}명 · 팔로잉 ${profile.followingCount}명 · 작품 ${profile.workCount}개|"> · 팔로워 0명 · 팔로잉 0명 · 작품 0개</span>
              </p>
              <div class="profileBadgeRow" data-profile-badges>
                <span class="profileBadgeChip" data-server-badge="true" th:each="badge : ${profileBadges}">
                  <img th:src="@{/images/badge/{file}(file=${badge.imageFile})}" th:alt="${badge.badgeName}">
                  <span th:text="${badge.badgeName}">뱃지명</span>
                </span>
              </div>
              <p class="channelText" th:text="${profile.bio != null and !#strings.isEmpty(profile.bio) ? profile.bio : '아직 등록된 소개글이 없습니다.'}">설명글입니다.</p>
              <div class="channelActionRow">
                <button type="button" class="moreBtn" data-more-button>프로필 관리</button>
                <button type="button" class="shareBtn" data-share-button>공유하기</button>
              </div>
            </div>
          </div>

          <nav class="tabRow">
            <a href="javascript:void(0)"
               class="tabBtn"
               th:classappend="${selectedTab != 'works'} ? ' is-active' : ''"
               data-channel-tab="galleries">예술관</a>
            <a href="javascript:void(0)"
               class="tabBtn"
               th:classappend="${selectedTab == 'works'} ? ' is-active' : ''"
               data-channel-tab="works">작품</a>
          </nav>
        </div>

        <div class="videoSection">
          <div class="filterRow">
            <button type="button" class="filterBtn is-active" data-video-filter>최신순</button>
            <button type="button" class="filterBtn" data-video-filter>인기순</button>
            <button type="button" class="filterBtn" data-video-filter>오래된순</button>
          </div>

          <div class="videoGrid" data-profile-panel="galleries" th:hidden="${selectedTab == 'works'}">
            <article class="videoCard"
                     th:if="${!#lists.isEmpty(galleries)}"
                     th:each="gallery : ${galleries}"
                     th:data-created-at="${gallery.createdDatetime}"
                     th:data-popularity="${(gallery.viewCount == null ? 0 : gallery.viewCount) + (gallery.likeCount == null ? 0 : gallery.likeCount)}"
                     th:classappend="${selectedGalleryId == gallery.id} ? ' is-selected' : ''">
              <a th:href="@{/gallery/{id}(id=${gallery.id})}"
                 class="videoThumb"
                 th:classappend="${gallery.coverImage == null or #strings.isEmpty(gallery.coverImage)} ? ' thumb-01' : ''">
                <img th:if="${gallery.coverImage != null and !#strings.isEmpty(gallery.coverImage)}"
                     th:src="${gallery.coverImage}"
                     th:alt="${gallery.title}">
                <span th:text="${selectedGalleryId == gallery.id} ? '선택됨' : 'GALLERY'">GALLERY</span>
              </a>
              <h2 class="videoTitle" th:text="${gallery.title}">예술관 제목</h2>
              <p class="videoMeta" th:text="|작품 ${gallery.workCount == null ? 0 : gallery.workCount}개 · 좋아요 ${gallery.likeCount == null ? 0 : gallery.likeCount}개|">작품 0개 · 좋아요 0개</p>
            </article>
            <div class="videoEmpty" th:if="${#lists.isEmpty(galleries)}">아직 등록된 예술관이 없습니다.</div>
          </div>

          <div class="videoGrid" data-profile-panel="works" th:hidden="${selectedTab != 'works'}">
            <article class="videoCard"
                     th:if="${!#lists.isEmpty(works)}"
                     th:each="work : ${works}"
                     th:data-created-at="${work.createdDatetime}"
                     th:data-popularity="${(work.viewCount == null ? 0 : work.viewCount) + (work.likeCount == null ? 0 : work.likeCount) + (work.saveCount == null ? 0 : work.saveCount)}">
              <a th:href="@{/work/detail/{id}(id=${work.id})}"
                 class="videoThumb"
                 th:classappend="${work.thumbnailUrl == null or #strings.isEmpty(work.thumbnailUrl)} ? ' thumb-02' : ''">
                <video th:if="${work.thumbnailUrl != null and !#strings.isEmpty(work.thumbnailUrl) and work.thumbnailFileType != null and #strings.startsWith(work.thumbnailFileType, 'video/')}"
                       class="videoThumbMedia"
                       th:src="${work.thumbnailUrl}"
                       muted
                       playsinline
                       preload="metadata"></video>
                <img th:if="${work.thumbnailUrl != null and !#strings.isEmpty(work.thumbnailUrl) and (work.thumbnailFileType == null or !#strings.startsWith(work.thumbnailFileType, 'video/'))}"
                     class="videoThumbMedia"
                     th:src="${work.thumbnailUrl}"
                     th:alt="${work.title}">
                <span th:text="${work.category == null ? 'WORK' : work.category}">WORK</span>
              </a>
              <h2 class="videoTitle" th:text="${work.title}">작품 제목</h2>
              <p class="videoMeta" th:text="|조회수 ${work.viewCount == null ? 0 : work.viewCount}회 · 좋아요 ${work.likeCount == null ? 0 : work.likeCount}개|">조회수 0회 · 좋아요 0개</p>
            </article>
            <div class="videoEmpty" th:if="${#lists.isEmpty(works)}">아직 등록된 작품이 없습니다.</div>
          </div>
        </div>
      </div>
    </div>

    <div id="share-modal" class="modal profile none workShareModalWrap">
      <div class="work-share-modal">
        <div class="work-share-modal__header">
          <div class="work-share-modal__spacer"></div>
          <h2 class="work-share-modal__title">공유</h2>
          <button class="work-share-modal__close" type="button" aria-label="닫기" onclick="modalClose('share-modal')">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <polyline fill="none" points="20.643 3.357 12 12 3.353 20.647" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></polyline>
              <line fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" x1="20.649" x2="3.354" y1="20.649" y2="3.354"></line>
            </svg>
          </button>
        </div>
        <div class="work-share-modal__link-row">
          <input class="work-share-modal__link-input" type="text" readonly th:value="${profilePath}" data-share-link-input>
          <button class="work-share-modal__link-copy" type="button" data-share-copy>복사</button>
        </div>
        <div class="work-share-modal__receiver">
          <label class="work-share-modal__label">받는 사람:</label>
          <div class="work-share-modal__receiver-body">
            <div class="work-share-modal__chips" data-share-chips></div>
            <input class="work-share-modal__search" type="text" placeholder="검색..." autocomplete="off" data-share-search>
          </div>
        </div>
        <div class="work-share-modal__list" data-share-list>
          <div class="followManageEmpty">공유 대상을 불러오는 중입니다.</div>
        </div>
        <div class="work-share-modal__footer">
          <input class="work-share-modal__message" type="text" placeholder="메시지 쓰기..." autocomplete="off" data-share-message>
          <button class="work-share-modal__send" type="button" data-share-send>보내기</button>
        </div>
      </div>
    </div>

    <div id="profile-edit-modal" class="modal profile none">
      <div class="profileEditModalPanel">
        <div class="profileSettingModalHeader">
          <h2 class="profileSettingModalTitle">프로필 수정</h2>
          <button type="button" class="profileSettingModalClose" data-modal-close="profile-edit-modal" aria-label="닫기">X</button>
        </div>
        <div class="profileEditModalBody">
          <div class="profileEditPreview" data-profile-edit-preview>N</div>
          <label class="profileEditUpload" for="profile-edit-file">사진 선택</label>
          <input id="profile-edit-file" type="file" accept="image/*" data-profile-edit-file />
          <button type="button" class="profileEditReset" data-profile-avatar-reset>기본 이미지로 변경</button>
          <div class="profileFormActionRow profileEditActionRow">
            <button type="button" class="profileFormBtn profileFormBtnGhost" data-modal-close="profile-edit-modal">취소</button>
            <button type="button" class="profileFormBtn profileFormBtnPrimary" data-profile-avatar-apply>적용하기</button>
          </div>
        </div>
      </div>
    </div>

    <div id="profile-setting-modal" class="modal profile none">
      <div class="profileSettingModalPanel">
        <div class="profileSettingModalHeader">
          <h2 class="profileSettingModalTitle">프로필 설정</h2>
          <button type="button" class="profileSettingModalClose" data-modal-close="profile-setting-modal" aria-label="닫기">X</button>
        </div>
        <div class="profileSettingModalList">
          <button type="button" class="profileSettingModalItem" data-banner-edit-open>배너 수정</button>
          <button type="button" class="profileSettingModalItem" data-profile-edit-open>프로필 수정</button>
          <button type="button" class="profileSettingModalItem" data-nickname-open>닉네임 수정</button>
          <button type="button" class="profileSettingModalItem" data-password-open>비밀번호 수정</button>
          <button type="button" class="profileSettingModalItem" data-follow-manage-open>팔로잉·팔로우 관리</button>
          <button type="button" class="profileSettingModalItem" data-badge-manage-open>뱃지관리</button>
        </div>
      </div>
    </div>

    <div id="banner-edit-modal" class="modal profile none">
      <div class="profileEditModalPanel profileBannerEditModalPanel">
        <div class="profileSettingModalHeader">
          <h2 class="profileSettingModalTitle">배너 수정</h2>
          <button type="button" class="profileSettingModalClose" data-modal-close="banner-edit-modal" aria-label="닫기">X</button>
        </div>
        <div class="profileEditModalBody">
          <div class="profileBannerPreview" data-profile-banner-preview>
            <span>배너 미리보기</span>
          </div>
          <label class="profileEditUpload" for="profile-banner-file">사진 선택</label>
          <input id="profile-banner-file" type="file" accept="image/*" data-profile-banner-file />
          <div class="profileFormActionRow profileEditActionRow">
            <button type="button" class="profileFormBtn profileFormBtnGhost profileFormBtnLeading" data-profile-banner-remove>배너 제거</button>
            <button type="button" class="profileFormBtn profileFormBtnGhost" data-modal-close="banner-edit-modal">취소</button>
            <button type="button" class="profileFormBtn profileFormBtnPrimary" data-profile-banner-apply>적용하기</button>
          </div>
        </div>
      </div>
    </div>

    <div id="follow-manage-modal" class="modal profile none">
      <div class="followManageModalPanel">
        <div class="profileSettingModalHeader">
          <h2 class="profileSettingModalTitle">팔로우 관리</h2>
          <button type="button" class="profileSettingModalClose" data-modal-close="follow-manage-modal" aria-label="닫기">X</button>
        </div>
        <div class="followManageTabRow">
          <button type="button" class="followManageTab is-active" data-follow-manage-tab="following">팔로잉</button>
          <button type="button" class="followManageTab" data-follow-manage-tab="followers">팔로워</button>
          <button type="button" class="followManageTab" data-follow-manage-tab="blocked">차단 목록</button>
        </div>
        <div class="followManageSearchRow">
          <input type="text" class="followManageSearchInput" placeholder="이름 또는 아이디로 검색" autocomplete="off" data-follow-manage-search />
        </div>
        <p class="followManageSummary" data-follow-manage-summary>팔로잉 목록을 관리하고 있습니다.</p>
        <div class="followManageList" data-follow-manage-list></div>
      </div>
    </div>

    <div id="badge-manage-modal" class="modal profile none">
      <div class="badgeManageModalPanel">
        <div class="profileSettingModalHeader">
          <h2 class="profileSettingModalTitle">뱃지 관리</h2>
          <button type="button" class="profileSettingModalClose" data-modal-close="badge-manage-modal" aria-label="닫기">X</button>
        </div>
        <p class="badgeManageSummary">보유한 뱃지 중 최대 2개까지 프로필에 표시할 수 있습니다.</p>
        <div class="badgeManageGrid" data-badge-manage-grid></div>
        <div class="profileFormActionRow">
          <button type="button" class="profileFormBtn profileFormBtnGhost" data-modal-close="badge-manage-modal">취소</button>
          <button type="button" class="profileFormBtn profileFormBtnPrimary" data-badge-manage-save>저장</button>
        </div>
      </div>
    </div>

    <div id="nickname-edit-modal" class="modal profile none">
      <div class="profileEditModalPanel">
        <div class="profileSettingModalHeader">
          <h2 class="profileSettingModalTitle">닉네임 수정</h2>
          <button type="button" class="profileSettingModalClose" data-modal-close="nickname-edit-modal" aria-label="닫기">X</button>
        </div>
        <div class="profileFormBody">
          <label class="profileFormLabel" for="profile-nickname-input">닉네임</label>
          <input id="profile-nickname-input" class="profileFormInput" type="text" th:value="${profile.nickname}" maxlength="20" data-profile-nickname-input />
          <div class="profileFormActionRow">
            <button type="button" class="profileFormBtn profileFormBtnGhost" data-modal-close="nickname-edit-modal">취소</button>
            <button type="button" class="profileFormBtn profileFormBtnPrimary" data-profile-nickname-save>저장</button>
          </div>
        </div>
      </div>
    </div>

    <div id="password-edit-modal" class="modal profile none">
      <div class="profileEditModalPanel">
        <div class="profileSettingModalHeader">
          <h2 class="profileSettingModalTitle">비밀번호 수정</h2>
          <button type="button" class="profileSettingModalClose" data-modal-close="password-edit-modal" aria-label="닫기">X</button>
        </div>
        <div class="profileFormBody">
          <label class="profileFormLabel" for="profile-password-current">현재 비밀번호</label>
          <input id="profile-password-current" class="profileFormInput" type="password" placeholder="현재 비밀번호를 입력하세요" />
          <label class="profileFormLabel" for="profile-password-next">새 비밀번호</label>
          <input id="profile-password-next" class="profileFormInput" type="password" placeholder="새 비밀번호를 입력하세요" />
          <label class="profileFormLabel" for="profile-password-confirm">새 비밀번호 확인</label>
          <input id="profile-password-confirm" class="profileFormInput" type="password" placeholder="새 비밀번호를 다시 입력하세요" />
          <div class="profileFormActionRow">
            <button type="button" class="profileFormBtn profileFormBtnGhost" data-modal-close="password-edit-modal">취소</button>
            <button type="button" class="profileFormBtn profileFormBtnPrimary" data-profile-password-save>저장</button>
          </div>
        </div>
      </div>
    </div>

    </main>
    <th:block th:replace="~{layout/layout :: ytShellScripts()}"></th:block>
  </body>
</html>
